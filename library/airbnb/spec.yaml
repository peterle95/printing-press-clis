name: airbnb-pp
description: Skip the Airbnb/VRBO platform fee. Find the host's direct booking site for any listing.
cli_description: Search Airbnb and VRBO, find the host's direct booking site, and report the cheapest of three sources side-by-side.
version: 0.1.0
base_url: https://www.airbnb.com
spec_source: hand-written
kind: synthetic
license: MIT
auth:
    type: cookie
    description: Public search and listing detail need no auth. Authenticated features (Airbnb wishlists, trips) use cookie import via 'auth login --chrome'.
    cookie_domains:
        - .airbnb.com
        - .vrbo.com
    setup_command: auth login --chrome
config:
    format: toml
    path: ~/.config/airbnb-pp-cli/config.toml
cache:
    enabled: true
    ttl: 1h
mcp:
    transport:
        - stdio
    endpoint_tools: visible
resources:
    airbnb_listing:
        description: Airbnb listings (search and detail) via SSR HTML scrape (openbnb pattern, no auth required).
        endpoints:
            search:
                method: GET
                path: /s/{slug}/homes
                description: Search Airbnb listings by location, dates, and guest count via the public SSR HTML page (openbnb pattern). Walks niobeClientData[0][1] Apollo cache to extract structured results.
                no_auth: true
                params:
                    - name: location
                      type: string
                      required: true
                      description: City or area name (e.g. "Lake Tahoe").
                    - name: checkin
                      type: string
                      required: false
                      description: Arrival date YYYY-MM-DD.
                    - name: checkout
                      type: string
                      required: false
                      description: Departure date YYYY-MM-DD.
                    - name: adults
                      type: int
                      required: false
                      description: Number of adults (default 1).
                    - name: children
                      type: int
                      required: false
                    - name: infants
                      type: int
                      required: false
                    - name: pets
                      type: int
                      required: false
                    - name: min_price
                      type: int
                      required: false
                    - name: max_price
                      type: int
                      required: false
                    - name: property_type
                      type: string
                      required: false
                      description: One of entire_home, private_room, shared_room, hotel_room.
                    - name: cursor
                      type: string
                      required: false
                      description: Pagination token from previous response.
                response:
                    type: array
                    item: airbnb_listing
                pagination:
                    type: cursor
                    cursor_param: cursor
                    cursor_response_path: paginationInfo.nextPageCursor
            get:
                method: GET
                path: /rooms/{id}
                description: Get full Airbnb listing detail (amenities, house rules, location, highlights, description, policies, host) via SSR HTML scrape.
                no_auth: true
                params:
                    - name: id
                      type: string
                      required: true
                      description: Airbnb listing ID.
                    - name: checkin
                      type: string
                      required: false
                    - name: checkout
                      type: string
                      required: false
                    - name: adults
                      type: int
                      required: false
                response:
                    type: object
                    item: airbnb_listing
    airbnb_wishlist:
        description: Airbnb wishlists (read user's saved listings; requires auth login --chrome).
        endpoints:
            list:
                method: GET
                path: /api/v3/WishlistIndexPageQuery/b8b421d802c399b55fb6ac1111014807a454184ad38f198365beb7836c018c18
                description: List the user's wishlists via Airbnb's GraphQL persisted query.
                response:
                    type: array
                    item: airbnb_wishlist
            items:
                method: GET
                path: /api/v3/WishlistItemsAsyncQuery/c0f9d9474bb20eb7af2f94f8e022750a5ed9b7437613e1d9aa91aadea87e4467
                description: Get items in a specific wishlist by listing IDs.
                params:
                    - name: listing_ids
                      type: string
                      required: true
                      description: Comma-separated list of listing IDs to fetch.
                response:
                    type: array
                    item: airbnb_wishlist_item
    vrbo_listing:
        description: VRBO listings (search and detail) via /graphql with Akamai warmup pattern.
        endpoints:
            search:
                method: POST
                path: /graphql
                description: Search VRBO properties via the propertySearch GraphQL operation. Uses Akamai warmup (GET / first, wait 1.5s, then POST).
                no_auth: true
                params:
                    - name: location
                      type: string
                      required: true
                    - name: checkin
                      type: string
                      required: false
                    - name: checkout
                      type: string
                      required: false
                    - name: adults
                      type: int
                      required: false
                    - name: children
                      type: int
                      required: false
                    - name: page
                      type: int
                      required: false
                    - name: page_size
                      type: int
                      required: false
                response:
                    type: array
                    item: vrbo_listing
                pagination:
                    type: offset
                    offset_param: page
                    page_size_param: page_size
            get:
                method: POST
                path: /graphql
                description: Get full VRBO property detail via the propertyDetail GraphQL operation (operation name discovered at runtime). Falls back to __PLUGIN_STATE__ SSR scrape for basic fields.
                no_auth: true
                params:
                    - name: id
                      type: string
                      required: true
                      description: VRBO numeric property ID.
                    - name: checkin
                      type: string
                      required: false
                    - name: checkout
                      type: string
                      required: false
                response:
                    type: object
                    item: vrbo_listing
    host:
        description: Host identity extraction (the linchpin of host-direct arbitrage).
        endpoints:
            extract:
                method: GET
                path: /__synthetic/host/extract
                description: Extract the host's brand or display name from a listing URL across both platforms. Uses propertyManagement.name (PMC) > host.displayName > description bio > photo signal.
                no_auth: true
                params:
                    - name: url
                      type: string
                      required: true
                response:
                    type: object
                    item: host
            portfolio:
                method: GET
                path: /__synthetic/host/portfolio
                description: List every known listing under one host or PMC across Airbnb and VRBO from the local store.
                no_auth: true
                params:
                    - name: name
                      type: string
                      required: true
                    - name: city
                      type: string
                      required: false
                response:
                    type: array
                    item: airbnb_listing
schemas:
    airbnb_listing:
        type: object
        properties:
            id: {type: string}
            title: {type: string}
            name: {type: string}
            url: {type: string}
            latitude: {type: number}
            longitude: {type: number}
            location: {type: string}
            primary_line: {type: string}
            secondary_line: {type: string}
            avg_rating: {type: number}
            reviews_count: {type: integer}
            price_primary: {type: string}
            price_total: {type: string}
            price_qualifier: {type: string}
            price_discounted: {type: string}
            price_original: {type: string}
            badges: {type: array, items: {type: string}}
            host_name: {type: string}
            host_brand: {type: string}
    airbnb_wishlist:
        type: object
        properties:
            id: {type: string}
            name: {type: string}
            item_count: {type: integer}
            updated_at: {type: string}
    airbnb_wishlist_item:
        type: object
        properties:
            listing_id: {type: string}
            wishlist_id: {type: string}
            saved_at: {type: string}
    vrbo_listing:
        type: object
        properties:
            id: {type: string}
            url: {type: string}
            title: {type: string}
            avg_rating: {type: number}
            reviews_count: {type: integer}
            price_per_night: {type: string}
            price_total: {type: string}
            cleaning_fee: {type: string}
            service_fee: {type: string}
            taxes: {type: string}
            host_name: {type: string}
            host_brand: {type: string}
            property_management_name: {type: string}
            beds: {type: integer}
            baths: {type: number}
            sleeps: {type: integer}
            location: {type: string}
            latitude: {type: number}
            longitude: {type: number}
            photo_urls: {type: array, items: {type: string}}
    host:
        type: object
        properties:
            name: {type: string}
            brand: {type: string}
            type: {type: string, description: "individual or pmc"}
            airbnb_id: {type: string}
            vrbo_id: {type: string}
            direct_url: {type: string}
            confidence: {type: number}
