[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "job-research-cli"
version = "0.1.0"
description = "Safe, compliant job research CLI for Berlin/Germany software searches."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Printing Press Local" }]
dependencies = [
  "httpx>=0.27,<1.0",
  "pydantic>=2.7,<3.0",
  "pyyaml>=6.0,<7.0",
  "rich>=13.7,<15.0",
  "typer>=0.12,<1.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2,<9.0",
  "respx>=0.21,<1.0",
]

[project.scripts]
jobs = "job_research_cli.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/job_research_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
