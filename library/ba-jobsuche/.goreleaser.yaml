version: 2
project_name: ba-jobsuche-pp-cli
changelog:
  disable: true
builds:
  - id: ba-jobsuche-pp-cli
    main: ./cmd/ba-jobsuche-pp-cli
    binary: ba-jobsuche-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ba-jobsuche-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ba-jobsuche-pp-mcp
    main: ./cmd/ba-jobsuche-pp-mcp
    binary: ba-jobsuche-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ba-jobsuche-pp-cli
    repository:
      owner: peter-moelzer
      name: homebrew-tap
    homepage: "https://github.com/peter-moelzer/ba-jobsuche-pp-cli"
    description: "Official Bundesagentur fuer Arbeit Jobsuche endpoint."
    install: |
      bin.install "ba-jobsuche-pp-cli"
      bin.install "ba-jobsuche-pp-mcp"
